<!-- index.html (complete) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>TrigBend — Offset</title>
  <link rel="stylesheet" href="./style.css?v=44" />
</head>
<body>
  <header>
    <div class="title">TrigBend — Offset</div>
  </header>

  <main>
    <section class="stage">
      <svg id="svg" viewBox="0 0 500 820" aria-label="Conduit drawing area">
        <defs>
          <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
          </pattern>

          <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.85)"></path>
          </marker>
        </defs>

        <!-- background grid (left column only) -->
        <rect x="0" y="0" width="244" height="820" fill="url(#grid)"></rect>
        <!-- right column background (slightly lighter) -->
        <rect x="244" y="0" width="256" height="820" fill="rgba(10,14,22,0.60)"></rect>

        <!-- vertical divider -->
        <line x1="244" y1="0" x2="244" y2="820" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

        <!-- baseline -->
        <line id="baseline" x1="0" y1="0" x2="0" y2="0"></line>

        <!-- pipe -->
        <path id="pipe" d=""></path>

        <!-- highlighted bend arcs -->
        <path id="ttSegment" d=""></path>

        <!-- invisible fat hitbox -->
        <path id="pipeHit" d=""></path>

        <!-- markers -->
        <circle id="t1" r="5"></circle>
        <circle id="t2" r="5"></circle>
        <circle id="handle" r="15"></circle>

        <!-- layout start tick + direction arrow -->
        <line id="startTick" x1="0" y1="0" x2="0" y2="0"></line>
        <path id="dirArrow" d=""></path>

        <!-- offset height measurement annotation -->
        <line id="mLineL" x1="0" y1="0" x2="0" y2="0"></line>
        <text id="mTextL" x="0" y="0"></text>

        <!-- lock status (tiny, bottom of conduit column) -->
        <text id="hudTitle" class="tappable" x="122" y="790"
              text-anchor="middle"
              style="font-size:11px; fill:rgba(120,220,255,0.50)">OFFSET LOCKED</text>

        <!-- ── Right column ── -->

        <!-- Flip button -->
        <g id="hudFlip" class="tappable">
          <rect x="256" y="14" width="230" height="48" rx="13"
                fill="rgba(30,44,68,0.90)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
          <text class="hudBtn" x="371" y="46" text-anchor="middle">Flip</text>
        </g>

        <!-- Angle card -->
        <g id="cardGroupAngle">
          <rect id="cardBgAngle" class="cardBg" x="256" y="76" width="230" height="128" rx="16"/>
          <text class="cardKey" id="keyAngle" x="272" y="106">Angle</text>
          <text class="cardVal tappable" id="hudAngle" x="474" y="182" text-anchor="end">—</text>
        </g>

        <!-- Offset card -->
        <g id="cardGroupOffset">
          <rect id="cardBgOffset" class="cardBg" x="256" y="218" width="230" height="128" rx="16"/>
          <text class="cardKey" id="keyOffset" x="272" y="248">Offset</text>
          <text class="cardVal tappable" id="hudOffset" x="474" y="324" text-anchor="end">—</text>
        </g>

        <!-- Between Bends card -->
        <g>
          <rect class="cardBg" x="256" y="360" width="230" height="128" rx="16"/>
          <text class="cardKey" x="272" y="390">Between Bends</text>
          <text class="cardVal tappable" id="hudSpacing" x="474" y="466" text-anchor="end">—</text>
        </g>

        <!-- Shrink card -->
        <g>
          <rect class="cardBg" x="256" y="502" width="230" height="128" rx="16"/>
          <text class="cardKey" x="272" y="532">Shrink</text>
          <text class="cardVal tappable" id="hudShrink" x="474" y="608" text-anchor="end">—</text>
        </g>

        <!-- Info drawer — overlays bottom of screen -->
        <g id="info" visibility="hidden">
          <rect id="infoBg" x="8" y="626" width="484" height="186" rx="16"></rect>
          <text id="infoTitle" x="24" y="654"></text>
          <text id="infoBody"  x="24" y="678"></text>
          <text id="infoBody2" x="24" y="700"></text>
          <text id="infoBody3" x="24" y="722"></text>
          <text id="infoClose" class="tappable" x="476" y="654" text-anchor="end">Close</text>
        </g>

        <!-- drag/status hint -->
        <text id="labelHelp" x="122" y="810" text-anchor="middle"></text>
      </svg>
    </section>
  </main>

  <script src="./app.js?v=44"></script>
</body>
</html>
