<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Conduit Visual MVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="title">Conduit Visual MVP — Offset</div>
    <div class="subtitle">Drag the pipe handle to change “Between Bends”. Offset stays locked.</div>
  </header>

  <main>
    <section class="stage">
      <svg id="svg" viewBox="0 0 900 520" aria-label="Conduit drawing area">
        <defs>
          <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
          </pattern>
        </defs>

        <!-- background grid -->
        <rect x="0" y="0" width="900" height="520" fill="url(#grid)"></rect>

        <!-- baseline (original centerline) -->
        <line id="baseline" x1="0" y1="0" x2="0" y2="0"></line>

        <!-- conduit path -->
        <path id="pipe" d=""></path>

        <!-- bend centers -->
        <circle id="c1" r="3"></circle>
        <circle id="c2" r="3"></circle>

        <!-- tangent points -->
        <circle id="t1" r="4"></circle>
        <circle id="t2" r="4"></circle>

        <!-- draggable handle (controls Between Bends with Offset locked) -->
        <circle id="handle" r="11"></circle>

        <!-- HUD -->
        <g id="hud">
          <rect id="hudBg" x="14" y="14" width="310" height="132" rx="12"></rect>

          <text class="hudTitle" x="28" y="40">OFFSET (LOCKED)</text>

          <text class="hudKey" x="28" y="68">Angle</text>
          <text class="hudVal tappable" id="hudAngle" x="210" y="68">—</text>

          <text class="hudKey" x="28" y="92">Offset</text>
          <text class="hudVal tappable" id="hudOffset" x="210" y="92">—</text>

          <text class="hudKey" x="28" y="116">Between Bends</text>
          <text class="hudVal tappable" id="hudSpacing" x="210" y="116">—</text>

          <text class="hudKey" x="28" y="140">Shrink</text>
          <text class="hudVal tappable" id="hudShrink" x="210" y="140">—</text>
        </g>

        <!-- Info drawer -->
        <g id="info" visibility="hidden">
          <rect id="infoBg" x="14" y="372" width="872" height="134" rx="14"></rect>
          <text id="infoTitle" x="28" y="404"></text>
          <text id="infoBody" x="28" y="432"></text>
          <text id="infoBody2" x="28" y="458"></text>
          <text id="infoBody3" x="28" y="484"></text>
          <text id="infoClose" class="tappable" x="820" y="404">Close</text>
        </g>

        <!-- small helper text -->
        <text id="labelHelp" x="18" y="178"></text>
      </svg>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
