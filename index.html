<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>TrigBend — Offset</title>
  <link rel="stylesheet" href="./style.css?v=40" />
</head>
<body>
  <header>
    <div class="title">TrigBend — Offset</div>
    <div class="subtitle">Drag pipe to change spacing. Tap Angle or Offset value to lock it. Tap Flip to rotate.</div>
  </header>

  <main>
    <section class="stage">
      <svg id="svg" viewBox="0 0 900 520" aria-label="Conduit drawing area">
        <defs>
          <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
          </pattern>

          <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.85)"></path>
          </marker>
        </defs>

        <rect x="0" y="0" width="900" height="520" fill="url(#grid)"></rect>

        <!-- baseline -->
        <line id="baseline" x1="0" y1="0" x2="0" y2="0"></line>

        <!-- pipe -->
        <path id="pipe" d=""></path>

        <!-- highlighted tangent-to-tangent straight segment -->
        <path id="ttSegment" d=""></path>

        <!-- invisible fat hitbox -->
        <path id="pipeHit" d=""></path>

        <!-- markers -->
        <circle id="t1" r="4"></circle>
        <circle id="t2" r="4"></circle>
        <circle id="handle" r="11"></circle>

        <!-- layout start tick + direction arrow -->
        <line id="startTick" x1="0" y1="0" x2="0" y2="0"></line>
        <path id="dirArrow" d=""></path>

        <!-- measurement line for L (between bends) -->
        <line id="mLineL" x1="0" y1="0" x2="0" y2="0"></line>
        <text id="mTextL" x="0" y="0"></text>

        <!-- HUD -->
        <g id="hud">
          <rect id="hudBg" x="14" y="14" width="360" height="132" rx="12"></rect>

          <text class="hudTitle" id="hudTitle" x="28" y="40">LOCKED: OFFSET</text>
          <text class="hudBtn tappable" id="hudFlip" x="330" y="40">Flip</text>

          <text class="hudKey" id="keyAngle" x="28" y="68">Angle</text>
          <text class="hudVal tappable" id="hudAngle" x="250" y="68">—</text>

          <text class="hudKey" id="keyOffset" x="28" y="92">Offset</text>
          <text class="hudVal tappable" id="hudOffset" x="250" y="92">—</text>

          <text class="hudKey" x="28" y="116">Between Bends</text>
          <text class="hudVal tappable" id="hudSpacing" x="250" y="116">—</text>

          <text class="hudKey" x="28" y="140">Shrink</text>
          <text class="hudVal tappable" id="hudShrink" x="250" y="140">—</text>
        </g>

        <!-- Info drawer -->
        <g id="info" visibility="hidden">
          <rect id="infoBg" x="14" y="372" width="872" height="134" rx="14"></rect>
          <text id="infoTitle" x="28" y="404"></text>
          <text id="infoBody" x="28" y="432"></text>
          <text id="infoBody2" x="28" y="458"></text>
          <text id="infoBody3" x="28" y="484"></text>
          <text id="infoClose" class="tappable" x="820" y="404">Close</text>
        </g>

        <text id="labelHelp" x="18" y="178"></text>
      </svg>
    </section>
  </main>

  <script src="./app.js?v=41"></script>
</body>
</html>
