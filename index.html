<!-- index.html (complete) — Part 1 rewrite -->
<!-- pages build trigger -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>TrigBend v53 — Offset</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="./style.css?v=53" />
</head>
<body>
  <header>
    <div class="title">TrigBend — Offset <span style="background:#f00;color:#fff;font-size:11px;padding:2px 6px;border-radius:4px;vertical-align:middle;">v53</span></div>
  </header>

  <main>
    <section class="stage">
      <svg id="svg" viewBox="0 0 500 820" aria-label="Conduit drawing area">
        <defs>
          <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
          </pattern>

          <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.85)"></path>
          </marker>
        </defs>

        <!-- background grid (left column only) -->
        <rect x="0" y="0" width="244" height="820" fill="url(#grid)"></rect>
        <!-- right column background (slightly lighter) -->
        <rect x="244" y="0" width="256" height="820" fill="rgba(10,14,22,0.60)"></rect>

        <!-- vertical divider -->
        <line x1="244" y1="0" x2="244" y2="820" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

        <!-- baseline -->
        <line id="baseline" x1="0" y1="0" x2="0" y2="0"></line>

        <!-- pipe -->
        <path id="pipe" d=""></path>

        <!-- highlighted bend arcs -->
        <path id="ttSegment" d=""></path>

        <!-- invisible fat hitbox -->
        <path id="pipeHit" d=""></path>

        <!-- markers -->
        <circle id="t1" r="5"></circle>
        <circle id="t2" r="5"></circle>
        <circle id="handle" r="18"></circle>

        <!-- layout start tick + direction arrow -->
        <line id="startTick" x1="0" y1="0" x2="0" y2="0"></line>
        <path id="dirArrow" d=""></path>

        <!-- offset height measurement annotation (baseline to exit) -->
        <line id="mLineL" x1="0" y1="0" x2="0" y2="0"></line>
        <text id="mTextL" x="0" y="0"></text>

        <!-- C1 to C2 dimension line (between bends, arc centers) -->
        <line id="mLineC" x1="0" y1="0" x2="0" y2="0"></line>
        <text id="mTextC" x="0" y="0"></text>

        <!-- lock status (tiny, bottom of left column) -->
        <text id="hudTitle" class="tappable" x="110" y="790"
              text-anchor="middle"
              style="font-size:11px; fill:rgba(120,220,255,0.50)">OFFSET LOCKED</text>

        <!-- ── Right column cards ── -->
        <!-- Cards: x=258, w=226, h=78, gap=8 -->
        <!-- Stack: y=14, 100, 186, 272, 358 -->

        <!-- Card 1: Angle  y=14 -->
        <g id="cardGroupAngle">
          <rect id="cardBgAngle" class="cardBg" x="258" y="14" width="226" height="78" rx="14"/>
          <text class="cardKey" id="keyAngle" x="272" y="36">Angle</text>
          <text class="cardVal tappable" id="hudAngle" x="480" y="79" text-anchor="end">—</text>
        </g>

        <!-- Card 2: Offset  y=100 -->
        <g id="cardGroupOffset">
          <rect id="cardBgOffset" class="cardBg" x="258" y="100" width="226" height="78" rx="14"/>
          <text class="cardKey" id="keyOffset" x="272" y="122">Offset</text>
          <text class="cardVal tappable" id="hudOffset" x="480" y="165" text-anchor="end">—</text>
        </g>

        <!-- Card 3: Between Bends  y=186 -->
        <g>
          <rect class="cardBg" x="258" y="186" width="226" height="78" rx="14"/>
          <text class="cardKey" x="272" y="208">Between Bends</text>
          <text class="cardVal tappable" id="hudSpacing" x="480" y="251" text-anchor="end">—</text>
        </g>

        <!-- Card 4: Shrink  y=272 -->
        <g>
          <rect class="cardBg" x="258" y="272" width="226" height="78" rx="14"/>
          <text class="cardKey" x="272" y="294">Shrink</text>
          <text class="cardVal tappable" id="hudShrink" x="480" y="337" text-anchor="end">—</text>
        </g>

        <!-- Card 5: Adjacent  y=358 -->
        <g id="hudAdjacent">
          <rect id="cardBgAdjacent" class="cardBg" x="258" y="358" width="226" height="78" rx="14"/>
          <text class="cardKey" id="keyAdjacent" x="272" y="380">Adjacent</text>
          <text class="cardVal" id="hudAdjacentVal" x="480" y="423" text-anchor="end">—</text>
        </g>

        <!-- Info drawer — overlays bottom of screen -->
        <g id="info" visibility="hidden">
          <rect id="infoBg" x="8" y="626" width="484" height="186" rx="16"></rect>
          <text id="infoTitle" x="24" y="654"></text>
          <text id="infoBody"  x="24" y="678"></text>
          <text id="infoBody2" x="24" y="700"></text>
          <text id="infoBody3" x="24" y="722"></text>
          <text id="infoClose" class="tappable" x="476" y="654" text-anchor="end">Close</text>
        </g>

        <!-- drag/status hint -->
        <text id="labelHelp" x="110" y="810" text-anchor="middle"></text>
      </svg>
    </section>
  </main>

  <!-- Input overlay (replaces prompt() — works on iOS standalone mode) -->
  <div id="inputOverlay" class="input-overlay hidden">
    <div class="input-sheet">
      <div id="inputLabel" class="input-label">Enter value</div>
      <input id="inputField" type="number" inputmode="decimal" class="input-field" autocomplete="off" />
      <div class="input-buttons">
        <button id="inputCancel" class="input-btn cancel">Cancel</button>
        <button id="inputOk" class="input-btn ok">OK</button>
      </div>
    </div>
  </div>

  <script src="./app.js?v=53"></script>
</body>
</html>
