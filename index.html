<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>TrigBend — Offset</title>
  <link rel="stylesheet" href="./style.css?v=42" />
</head>
<body>
  <header>
    <div class="title">TrigBend — Offset</div>
    <div class="subtitle">Drag pipe to change spacing. Tap Angle or Offset value to lock it. Tap Flip to rotate.</div>
  </header>

  <main>
    <section class="stage">
      <svg id="svg" viewBox="0 0 500 820" aria-label="Conduit drawing area">
        <defs>
          <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
          </pattern>

          <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.85)"></path>
          </marker>
        </defs>

        <rect x="0" y="0" width="500" height="820" fill="url(#grid)"></rect>

        <!-- baseline -->
        <line id="baseline" x1="0" y1="0" x2="0" y2="0"></line>

        <!-- pipe -->
        <path id="pipe" d=""></path>

        <!-- highlighted bend arcs -->
        <path id="ttSegment" d=""></path>

        <!-- invisible fat hitbox -->
        <path id="pipeHit" d=""></path>

        <!-- markers -->
        <circle id="t1" r="5"></circle>
        <circle id="t2" r="5"></circle>
        <circle id="handle" r="15"></circle>

        <!-- layout start tick + direction arrow -->
        <line id="startTick" x1="0" y1="0" x2="0" y2="0"></line>
        <path id="dirArrow" d=""></path>

        <!-- offset height measurement annotation -->
        <line id="mLineL" x1="0" y1="0" x2="0" y2="0"></line>
        <text id="mTextL" x="0" y="0"></text>

        <!-- HUD — full width across top -->
        <g id="hud">
          <rect id="hudBg" x="14" y="14" width="472" height="180" rx="14"></rect>

          <text class="hudTitle" id="hudTitle" x="28" y="46">OFFSET LOCKED</text>
          <text class="hudBtn tappable" id="hudFlip" x="466" y="46" text-anchor="end">Flip</text>

          <text class="hudKey" id="keyAngle" x="28" y="82">Angle</text>
          <text class="hudVal tappable" id="hudAngle" x="466" y="82" text-anchor="end">—</text>

          <text class="hudKey" id="keyOffset" x="28" y="114">Offset</text>
          <text class="hudVal tappable" id="hudOffset" x="466" y="114" text-anchor="end">—</text>

          <text class="hudKey" x="28" y="146">Between Bends</text>
          <text class="hudVal tappable" id="hudSpacing" x="466" y="146" text-anchor="end">—</text>

          <text class="hudKey" x="28" y="178">Shrink</text>
          <text class="hudVal tappable" id="hudShrink" x="466" y="178" text-anchor="end">—</text>
        </g>

        <!-- Info drawer — anchored to bottom -->
        <g id="info" visibility="hidden">
          <rect id="infoBg" x="14" y="614" width="472" height="196" rx="14"></rect>
          <text id="infoTitle" x="28" y="642"></text>
          <text id="infoBody" x="28" y="668"></text>
          <text id="infoBody2" x="28" y="692"></text>
          <text id="infoBody3" x="28" y="716"></text>
          <text id="infoClose" class="tappable" x="466" y="642" text-anchor="end">Close</text>
        </g>

        <text id="labelHelp" x="18" y="202"></text>
      </svg>
    </section>
  </main>

  <script src="./app.js?v=42"></script>
</body>
</html>
